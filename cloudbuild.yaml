# FreshGuard — GCP Cloud Build pipeline
# Deploys backend + frontend to Cloud Run on every push to main.
#
# One-time setup: see deploy/README.md and run deploy/gcp-setup.sh
#
# Manual run:
#   gcloud builds submit --config=cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _AR_REPO: freshguard
  _BACKEND_SERVICE: freshguard-backend
  _FRONTEND_SERVICE: freshguard-frontend
  # Set when using Cloud SQL, e.g. my-project:us-central1:freshguard-db
  _CLOUDSQL_INSTANCE: ""

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_MAPS_PLATFORM_KEY/versions/latest
      env: GOOGLE_MAPS_PLATFORM_KEY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:latest

steps:
  # ── Backend ────────────────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:latest
      - ./backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend
    waitFor: [build-backend]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -n "${_CLOUDSQL_INSTANCE}" ]; then
          gcloud run deploy ${_BACKEND_SERVICE} \
            --project=$PROJECT_ID \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --add-cloudsql-instances=${_CLOUDSQL_INSTANCE} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,SMTP_PASS=SMTP_PASS:latest,SMTP_USER=SMTP_USER:latest,OPENWEATHER_API_KEY=OPENWEATHER_API_KEY:latest,NEWS_API_KEY=NEWS_API_KEY:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest \
            --set-env-vars=SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,NODE_ENV=production
        else
          gcloud run deploy ${_BACKEND_SERVICE} \
            --project=$PROJECT_ID \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,SMTP_PASS=SMTP_PASS:latest,SMTP_USER=SMTP_USER:latest,OPENWEATHER_API_KEY=OPENWEATHER_API_KEY:latest,NEWS_API_KEY=NEWS_API_KEY:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest \
            --set-env-vars=SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,NODE_ENV=production
        fi
    waitFor: [push-backend]

  - id: backend-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe ${_BACKEND_SERVICE} \
          --project=$PROJECT_ID \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"
    waitFor: [deploy-backend]

  # ── Frontend ───────────────────────────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    secretEnv: [GOOGLE_MAPS_PLATFORM_KEY]
    args:
      - build
      - --build-arg
      - GOOGLE_MAPS_PLATFORM_KEY=$$GOOGLE_MAPS_PLATFORM_KEY
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:latest
      - ./main
    waitFor: [backend-url]

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend
    waitFor: [build-frontend]

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy ${_FRONTEND_SERVICE} \
          --project=$PROJECT_ID \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --set-env-vars=NODE_ENV=production,BACKEND_URL=$$BACKEND_URL \
          --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest
        echo "Frontend deployed. BACKEND_URL=$$BACKEND_URL"
    waitFor: [push-frontend]
